<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kata Klasik</title>
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
        h3 { margin: 10px 0 20px 0; font-size: 24px; letter-spacing: 2px; color: #fff; }
        
        #board { display: flex; flex-direction: column; gap: 8px; }
        .row { display: flex; gap: 8px; }
        .box { width: 45px; height: 45px; border: 2px solid #333; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 24px; text-transform: uppercase; }
        
        #status-msg { height: 30px; margin-bottom: 15px; font-size: 14px; color: #888; }
    </style>
</head>
<body>

    <h3>KATA KLASIK</h3>
    <div id="status-msg">Memuat kata...</div>
    <div id="board"></div>

<script>
    // --- KONFIGURASI ---
    // GANTI [URL_CLOUDFLARE_KAMU] dengan link tunnel kamu
    const API_BASE_URL = "https://[URL_CLOUDFLARE_KAMU].trycloudflare.com"; 

    let secretWord = "DUNIA"; // Default
    let currentRow = 0;
    let currentInput = "";
    let gameOver = false;
    const board = document.getElementById('board');
    const statusMsg = document.getElementById('status-msg');

    async function fetchSecretWord() {
        try {
            const response = await fetch(`${API_BASE_URL}/get_data`);
            const data = await response.json();
            secretWord = data.word.toUpperCase();
            statusMsg.innerText = "";
        } catch (error) {
            statusMsg.innerText = "Gagal terhubung ke server.";
        }
    }

    function createRow() {
        const row = document.createElement('div');
        row.className = 'row';
        row.id = 'row-' + currentRow;
        for (let j = 0; j < 5; j++) {
            const box = document.createElement('div');
            box.className = 'box';
            row.appendChild(box);
        }
        board.appendChild(row);
    }

    // Input dari keyboard HP
    document.addEventListener('keydown', (e) => {
        if (gameOver) return;

        if (e.key === "Enter") {
            if (currentInput.length === 5) checkWord();
        } else if (e.key === "Backspace") {
            currentInput = currentInput.slice(0, -1);
            updateBoard();
        } else if (currentInput.length < 5 && /^[a-zA-Z]$/.test(e.key)) {
            currentInput += e.key.toUpperCase();
            updateBoard();
        }
    });

    function updateBoard() {
        const boxes = document.getElementById('row-' + currentRow).querySelectorAll('.box');
        for (let i = 0; i < 5; i++) {
            boxes[i].innerText = currentInput[i] || "";
        }
    }

    function checkWord() {
        const rowEl = document.getElementById('row-' + currentRow);
        const boxes = rowEl.querySelectorAll('.box');
        let tempSecret = secretWord.split('');

        // Cek warna
        for(let i=0; i<5; i++) {
            if(currentInput[i] === secretWord[i]) {
                boxes[i].style.backgroundColor = "#4CAF50"; // Hijau
                tempSecret[i] = null;
            }
        }
        for(let i=0; i<5; i++) {
            if(boxes[i].style.backgroundColor !== "rgb(76, 175, 80)") {
                if(tempSecret.includes(currentInput[i])) {
                    boxes[i].style.backgroundColor = "#FF9800"; // Oranye
                    tempSecret[tempSecret.indexOf(currentInput[i])] = null;
                } else {
                    boxes[i].style.backgroundColor = "#333"; // Abu
                }
            }
        }

        if (currentInput === secretWord) {
            statusMsg.innerText = "SELAMAT! ANDA BERHASIL.";
            statusMsg.style.color = "#4CAF50";
            gameOver = true;
        } else {
            currentRow++;
            currentInput = "";
            createRow();
        }
    }

    fetchSecretWord();
    createRow();
</script>
</body>
</html>
