<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kata Klasik (Live View)</title>
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; margin: 0; height: 100dvh; overflow: hidden; display: flex; flex-direction: column; }
        #header, .keyboard, .modal-overlay, #main-menu { display: none !important; }
        #board-area { flex: 1; display: flex; justify-content: center; align-items: center; }
        #controls-area { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; padding-bottom: 20px; width: 100%; }
        #status-msg { font-size: 18px; height: 30px; text-align: center; margin-bottom: 10px; font-weight: bold; color: #fff; }
        
        .grid { display: grid; grid-template-rows: repeat(8, 50px); gap: 8px; }
        .row { display: grid; grid-template-columns: repeat(5, 50px); gap: 8px; }
        .box { width: 50px; height: 50px; border: 2px solid #333; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 28px; text-transform: uppercase; background: #1e1e1e; }
        
        /* Warna hasil tebakan */
        .box.correct { background-color: #6aaa64; border-color: #6aaa64; }
        .box.present { background-color: #c9b458; border-color: #c9b458; }
        .box.absent { background-color: #787c7e; border-color: #787c7e; }
    </style>
</head>
<body>

<div id="game-katla" style="display: flex; flex-direction: column; height: 100vh;">
    <div id="board-area"><div class="grid" id="board"></div></div>
    <div id="controls-area">
        <div id="status-msg">Live Status: Menunggu data...</div>
    </div>
</div>

<script>
    const board = document.getElementById('board');
    const statusMsg = document.getElementById('status-msg');

    // 1. Buat Grid Kosong
    function createBoard() {
        board.innerHTML = "";
        for (let i = 0; i < 8; i++) {
            const row = document.createElement('div');
            row.className = 'row';
            for (let j = 0; j < 5; j++) {
                const box = document.createElement('div');
                box.className = 'box';
                row.appendChild(box);
            }
            board.appendChild(row);
        }
    }

    // 2. Ambil data dari server (GANTI URL DI BAWAH INI)
    // Jika Vercel tidak bisa akses localhost, gunakan URL Ngrok/Public server kamu
    async function fetchData() {
        try {
            // GANTI 'http://localhost:5000' dengan alamat IP atau Ngrok server kamu jika perlu
            const response = await fetch('https://gerald-specially-generic-stood.trycloudflare.com'); 
            const data = await response.json(); 
            
            // Asumsi data: { "grid": ["ABADI", "KABAR"], "results": [[2,2,2,2,2], [0,1,0,0,0]] }
            // 2 = Hijau, 1 = Kuning, 0 = Abu-abu
            updateBoard(data);
            statusMsg.innerText = "Live Terhubung";
        } catch (e) {
            statusMsg.innerText = "Server Terputus...";
        }
    }

    // 3. Update tampilan
    function updateBoard(data) {
        const rows = document.querySelectorAll('.row');
        if (!data.grid) return;

        data.grid.forEach((word, rowIndex) => {
            const boxes = rows[rowIndex].querySelectorAll('.box');
            for(let i=0; i<5; i++) {
                boxes[i].innerText = word[i] || "";
                // Warna berdasarkan hasil
                if(data.results && data.results[rowIndex]) {
                    const status = data.results[rowIndex][i];
                    if(status === 2) boxes[i].classList.add('correct');
                    else if(status === 1) boxes[i].classList.add('present');
                    else if(status === 0 && word[i]) boxes[i].classList.add('absent');
                }
            }
        });
    }

    createBoard();
    setInterval(fetchData, 1000); // Cek setiap 1 detik
</script>
</body>
</html>
