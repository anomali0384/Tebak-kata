<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kata Klasik Live</title>
    <style>
        body { 
            background-color: #121212; 
            color: white; 
            font-family: sans-serif; 
            margin: 0; 
            height: 100dvh; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
        }

        #game-katla { 
            width: 100%; 
            height: 100dvh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            box-sizing: border-box; 
        }
        
        #header-center { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            margin-bottom: 25px; 
        }
        
        #header-center h3 { 
            text-align: center; 
            margin: 0; 
            font-size: 28px; 
            font-weight: bold; 
            letter-spacing: 2px; 
            color: #fff;
        }

        #board-area { 
            flex: 0 0 auto; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            margin-bottom: 20px; 
        }
        
        .grid { 
            display: grid; 
            grid-template-rows: repeat(8, 44px); 
            gap: 12px; 
        }
        .row { 
            display: grid; 
            grid-template-columns: repeat(5, 44px); 
            gap: 4px; 
            transition: transform 0.1s; 
        }
        .box { 
            width: 44px; 
            height: 44px; 
            border: 2px solid #333; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-family: 'Arial Black', sans-serif; 
            font-weight: 900; 
            font-size: 22px; 
            text-transform: uppercase; 
            border-radius: 4px; 
            box-sizing: border-box; 
        }
        .row.hidden-row { 
            visibility: hidden; 
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-5px); }
            40% { transform: translateX(5px); }
            60% { transform: translateX(-5px); }
            80% { transform: translateX(5px); }
        }
        .shake { animation: shake 0.4s; }

        #status-msg { 
            font-size: 16px; 
            height: 30px; 
            text-align: center; 
            margin-top: 15px; 
            font-weight: bold; 
        }
    </style>
</head>
<body>

<div id="game-katla">
    <div id="header-center">
        <h3>KATA KLASIK</h3>
    </div>
    
    <div id="board-area">
        <div class="grid" id="board"></div>
    </div>
    
    <div id="status-msg"></div>

    let secretWord, attempts, currentRow, currentInput, gameOver;
    const board = document.getElementById('board');
    const statusMsg = document.getElementById('status-msg');

    function initGame() {
        secretWord = dictionary[Math.floor(Math.random() * dictionary.length)];
        attempts = 8; 
        currentRow = 0; 
        currentInput = ""; 
        gameOver = false;
        statusMsg.innerText = ""; 
        statusMsg.style.color = "white";
        board.innerHTML = "";
        
        for (let i = 0; i < 8; i++) {
            const row = document.createElement('div');
            row.className = 'row' + (i === 0 ? '' : ' hidden-row');
            row.id = 'row-' + i;
            for (let j = 0; j < 5; j++) {
                const box = document.createElement('div');
                box.className = 'box';
                row.appendChild(box);
            }
            board.appendChild(row);
        }
    }

    function handleInput(key) {
        if (gameOver) return;
        key = key.toUpperCase();
        
        if (key.length === 1 && key >= 'A' && key <= 'Z') {
            if (currentInput.length < 5) {
                currentInput += key;
                statusMsg.innerText = "";
                updateBoard();
                if (currentInput.length === 5) {
                    setTimeout(checkWord, 300);
                }
            }
        }
    }

    function updateBoard() {
        const boxes = document.getElementById('row-' + currentRow).querySelectorAll('.box');
        for (let i = 0; i < 5; i++) {
            boxes[i].innerText = currentInput[i] || "";
        }
    }

    function checkWord() {
        if (currentInput.length < 5) return;
        
        if (!dictionary.includes(currentInput)) {
            statusMsg.innerText = "Tidak ada di kamus!";
            statusMsg.style.color = "orange";
            const rowEl = document.getElementById('row-' + currentRow);
            rowEl.classList.add('shake');
            setTimeout(() => rowEl.classList.remove('shake'), 400);
            currentInput = "";
            updateBoard();
            return;
        }
        
        statusMsg.style.color = "white";
        attempts--;
        
        const rowEl = document.getElementById('row-' + currentRow);
        const boxes = rowEl.querySelectorAll('.box');
        let tempSecret = secretWord.split('');
        
        for(let i=0; i<5; i++) {
            if(currentInput[i] === secretWord[i]) {
                boxes[i].style.backgroundColor = "#538d4e";
                boxes[i].style.borderColor = "#538d4e";
                tempSecret[i] = null;
            }
        }
        for(let i=0; i<5; i++) {
            if(boxes[i].style.backgroundColor !== "rgb(83, 141, 78)") {
                if(tempSecret.includes(currentInput[i])) {
                    boxes[i].style.backgroundColor = "#b59f3b";
                    boxes[i].style.borderColor = "#b59f3b";
                    boxes[i].style.color = "black";
                    tempSecret[tempSecret.indexOf(currentInput[i])] = null;
                } else {
                    boxes[i].style.backgroundColor = "#333";
                    boxes[i].style.borderColor = "#333";
                }
            }
        }

        if (currentInput === secretWord) {
            statusMsg.innerText = "MENANG!";
            statusMsg.style.color = "#4CAF50";
            gameOver = true;
            setTimeout(initGame, 3000); // Otomatis mulai game baru setelah 3 detik
        } else if (attempts === 0) {
            statusMsg.innerHTML = `GAME OVER - Kata: <span style="color:white">${secretWord}</span>`;
            statusMsg.style.color = "#ff4444";
            gameOver = true;
            setTimeout(initGame, 4000); // Otomatis mulai game baru setelah 4 detik
        } else {
            currentRow++;
            const nextRow = document.getElementById('row-' + currentRow);
            if(nextRow) nextRow.classList.remove('hidden-row');
            currentInput = "";
        }
    }

    // Jalankan game saat pertama kali dibuka
    initGame();
</script>

  // Kotak informasi penonton mengambang di atas layar
  let infoBox = document.createElement('div');
  infoBox.style.position = 'fixed';

  infoBox.innerText = 'Menunggu penonton berkomentar...';
  document.body.appendChild(infoBox);

  supabase
    .channel('custom-insert-channel')
    .on(
      'postgres_changes',
      { event: 'INSERT', schema: 'public', table: 'Masukan_permainan' },
      (payload) => {
        const username = payload.new.username;
        const tebakan = payload.new.tebakan.trim();
        
        console.log(`[LIVE] ${username} menebak: ${tebakan}`);
        
        // Tampilkan nama dan tebakan penonton di layar
        infoBox.innerText = `💬 @${username} menebak: ${tebakan}`;
        
        // Kirim huruf tebakan ke fungsi game
        if (tebakan.length === 1 && typeof handleInput === 'function') {
            handleInput(tebakan.toUpperCase());
        }
      }
    )
    .subscribe();
</script>
